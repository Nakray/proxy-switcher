version: '3.8'

services:
  proxy-switcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxy-switcher
    restart: unless-stopped
    ports:
      # SOCKS5 proxy port
      - "1080:1080"
      # MTProto proxy port
      - "2080:2080"
      # Prometheus metrics port
      - "9090:9090"
    volumes:
      # Mount configuration
      - ./configs/config.yaml:/app/config.yaml:ro
      # Persist SQLite database
      - ./data:/app/data
    environment:
      # Override config with environment variables (optional)
      - TZ=UTC
      # - BOT_TOKEN=your-bot-token
      # - BOT_ADMIN_CHAT_IDS=[123456789]
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: proxy-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - proxy-network
    depends_on:
      - proxy-switcher
    profiles:
      - monitoring

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: proxy-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - proxy-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

networks:
  proxy-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
